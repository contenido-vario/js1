<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

<style type="text/tailwindcss">
      @import "tailwindcss"; 
        
      @layer base {
      /* Usamos :root para asegurar que el interlineado mande sobre todo */
      :root {
        line-height: 1.5;
      }
      
       body {
            @apply text-gray-700;
        }
        p, h1, h2, h3 {
          @apply mb-2 text-gray-700
        }
        h1, h2, h3 {
          @apply mt-2 font-bold text-slate-500
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono
        }
        input, label {
          @apply inline-block flex-1 pl-4
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1
        }
        summary {
          @apply bg-slate-700 text-white font-bold
        }
        code {
          @apply text-blue-800
        }
        ul {
          list-style-type: circle;
          @apply ml-4
        }

        a {
          /* Borde inferior slate-500, ancho de 1px y estilo dotted */
          @apply border-b border-dotted border-slate-500;
    
          /* Suavizar la transición del hover */
          @apply transition-all duration-200 inline-block;
        }

        a:hover {
          /* Escalar la letra a 1.1 y fondo slate-200 */
          @apply scale-[1.1] bg-slate-200;
        }
      }
    </style>
  <title>Ejercicios JavaScript</title>
</head>

<body class="container mx-auto w-4/5">
  <h1 class="text-pink-800 font-bold text-xl my-2">Ejercicios JavaScript</h1>

    <li>Repaso <code>getElementById</code>. <a target="_blank" href="./test/index.html">Test divertido</a> - <a target="_blank" href="./test/ResultadoTest.pdf">Instrucciones</a></li>
    <li>Ejercicios Entrada/Salida de Datos. <a target="_blank" href="ejerciciosio.html">Ejercicios I/O</a></li>
  </ul>
</body>
</html>
