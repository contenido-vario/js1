<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
      @import "tailwindcss"; 
  
      @layer base {
        p, h1, h2, h3 {
          @apply mb-2 leading-relaxed text-gray-700
        }
        h1, h2, h3 {
          @apply mt-2 font-bold text-slate-500
        }
        input {
          @apply rounded-sm border-1 border-slate-300 text-slate-400 font-mono
        }
        input, label {
          @apply inline-block flex-1 pl-4
        }
        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1
        }
        details {
          @apply mb-4 pb-4 border-b-slate-700 border-b-1
        }
        summary {
          @apply bg-slate-700 text-white font-bold
        }
        code {
          @apply text-blue-800
        }
        ul {
          list-style-type: circle;
          @apply ml-4
        }
      }
    </style>
  <title>JS 2026.04.27</title>
</head>

<body class="container mx-auto w-4/5">
  <h1 class="text-2xl" id="titulo">Primera clase JS</h1>
  <p>Botón derecho -> Inspeccionar -> Consola (para ver la consola)</p>
  <hr>
  <p class="my-2">
    <label for="internet">Coste de Internet: </label>
    <input class="border-slate-800 border" 
           type="number" id="internet" value="50">
  </p>
  <p class="my-2">
    <button class="border-slate-800 border"
      onclick="internetAnual()">Calcular Internet Anual</button></p>

  <script src="./js/app.js"></script>
</body>

</html>
